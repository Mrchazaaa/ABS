name: Tests

on:
  push:

jobs:
  build:
    uses: ./.github/workflows/cmake-build.yml
    with:
      upload-build-artifact: true

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: cmake-build
          path: build

      - name: Run tests
        run: ctest --test-dir build --output-on-failure -C Release
